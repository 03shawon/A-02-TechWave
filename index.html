<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechWave - Podcast Website</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <main class="min-h-screen">
        <header class="sticky top-0 z-50 bg-[#0a051d]/95 backdrop-blur-sm border-b border-white/5">
            <nav class="flex justify-between items-center px-6 lg:px-20 py-4 max-w-[1440px] mx-auto">

                <div class="text-3xl font-bold tracking-tight">
                    <span class="text-white">Tech</span><span class="gradient-text">Wave</span>
                </div>

                <ul class="hidden lg:flex items-center space-x-12 text-sm font-medium text-gray-300">
                    <li><a href="#about" class="hover:text-[#FF31B8] transition-colors">About</a></li>
                    <li><a href="#episodes" class="hover:text-[#FF31B8] transition-colors">Episodes</a></li>
                    <li><a href="#host" class="hover:text-[#FF31B8] transition-colors">Host</a></li>
                </ul>

                <div class="hidden lg:block">
                    <button
                        class="gradient-btn group px-6 py-2.5 rounded-full font-semibold text-sm flex items-center gap-2 transition hover:opacity-90">
                        Subscribe
                        <span class="transition-transform group-hover:translate-x-1">→</span>
                    </button>
                </div>

                <div class="lg:hidden flex items-center">
                    <button class="p-1">
                        <img src="./assets/hamburger-menu.png" class="w-8 h-8 invert" alt="Menu">
                    </button>
                </div>

            </nav>
        </header>

        <section class="relative flex flex-col items-center text-center py-20 px-6 overflow-hidden">

            <div class="absolute inset-0 z-0 opacity-40">
                <img src="./assets/hero-bg.png" class="w-full h-full object-contain" alt="">
            </div>

            <div class="relative z-10 flex flex-col items-center">
                <div class="relative w-48 h-48 lg:w-64 lg:h-64 flex items-center justify-center">
                    <img src="./assets/hero-circle.png" class="w-full h-full animate-pulse" alt="Circle View">

                    <img src="./assets/microphone.png" class="absolute w-12 lg:w-16" alt="Microphone">

                    <span
                        class="absolute top-4 right-4 bg-[#00FF85] text-black text-[10px] font-bold px-3 py-1 rounded-md shadow-[0_0_15px_rgba(0,255,133,0.6)]">
                        NEW
                    </span>
                </div>

                <div class="mt-10">
                    <h1 class="text-4xl lg:text-6xl font-extrabold tracking-tight">TechWave</h1>
                    <p class="text-gray-400 mt-5 max-w-xl mx-auto leading-relaxed text-sm lg:text-base">
                        Your daily dose of tech insights, productivity hacks, and personal growth
                    </p>
                </div>

                <div class="flex flex-col sm:flex-row gap-4 mt-10">
                    <button
                        class="gradient-btn px-8 py-3.5 rounded-full flex items-center justify-center font-semibold text-sm transition hover:scale-105 shadow-xl shadow-purple-500/20">
                        <img src="./assets/spotify.png" class="w-5 mr-2" alt=""> Listen On Spotify
                    </button>
                    <button
                        class="border border-purple-500/50 px-8 py-3.5 rounded-full font-semibold text-sm transition hover:bg-purple-500/10 flex items-center justify-center">
                        <img src="./assets/message.png" class="w-5 mr-2" alt="">
                        Subscribe
                    </button>
                </div>
            </div>
        </section>
    </main>

</body>

</html>
